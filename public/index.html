<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Auditoría Mercado Libre PRO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .btn-ml {
      background-color: #fff159; /* El amarillo clásico de Mercado Libre */
      color: #333;
      font-weight: 600;
      border: none;
    }
    .btn-ml:hover {
      background-color: #e6d700;
    }
  </style>
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">

    <h2 class="text-center mb-4"> Auditoría Mercado Libre </h2>

    <div class="mb-4">
      <label class="form-label fw-semibold">Cuenta Mercado Libre</label>

      <div class="d-flex flex-column gap-2">
        <div class="d-flex gap-2">
          <select id="mlAccountSelect" class="form-select">
            <option value="">-- Selecciona una cuenta --</option>
          </select>

          <button type="button" id="btnLoadAccounts" class="btn btn-outline-secondary">
             Actualizar lista
          </button>
        </div>
        
        <a id="linkConectarML" href="#" class="btn btn-ml w-100 mt-1">
          + Conectar nueva cuenta de Mercado Libre
        </a>
      </div>

      <small class="text-muted d-block mt-2">
        Si no ves tu cuenta, haz clic en el botón amarillo para autorizar.
      </small>
    </div>

    <form id="formUpload">
      <div class="mb-3">
        <label class="form-label">Subir Excel (SKU, price, description)</label>
        <input type="file" id="fileInput" class="form-control" accept=".xlsx,.xls">
      </div>

      <button type="submit" class="btn btn-primary w-100">
         Auditar productos
      </button>
    </form>

    <div id="loading" class="text-center mt-3 d-none">
      <div class="spinner-border text-primary"></div>
      <p>Analizando productos en Mercado Libre...</p>
    </div>

    <div id="resultado" class="mt-4"></div>

  </div>
</div>

<script>
// --- CONFIGURACIÓN DE TU APP ---
const CLIENT_ID = "TU_CLIENT_ID_AQUI"; // <--- REEMPLAZA ESTO
const REDIRECT_URI = "https://datasentinel-jas2.onrender.com/callback";

// Configurar el enlace del botón disparador dinámicamente
const linkConectarML = document.getElementById("linkConectarML");
linkConectarML.href = `https://auth.mercadolibre.cl/authorization?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}`;

// --- TU LÓGICA DE JAVASCRIPT EXISTENTE ---
const form = document.getElementById("formUpload");
const fileInput = document.getElementById("fileInput");
const loading = document.getElementById("loading");
const resultado = document.getElementById("resultado");
const mlAccountSelect = document.getElementById("mlAccountSelect");
const btnLoadAccounts = document.getElementById("btnLoadAccounts");

const API_URL = "/auditar";

btnLoadAccounts.addEventListener("click", async () => {
  try {
    const res = await fetch("/api/accounts");
    const data = await res.json();

    mlAccountSelect.innerHTML = '<option value="">-- Selecciona una cuenta --</option>';

    if (!data.accounts || data.accounts.length === 0) {
      alert("No hay cuentas conectadas. Usa el botón amarillo para conectar una.");
      return;
    }

    data.accounts.forEach(acc => {
      const opt = document.createElement("option");
      opt.value = acc.account_id;
      opt.textContent = acc.nickname;
      mlAccountSelect.appendChild(opt);
    });

  } catch (err) {
    console.error(err);
    alert("Error al cargar las cuentas");
  }
});

// El resto de tu evento 'form.addEventListener' sigue exactamente igual...
// (Mantén el código de envío del formulario que ya tenías escrito)
</script>
</body>
</html>
